# 依赖更新 PR 由机器人提交，维护者每周批量 Review 即可
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 8
    labels:
      - dependencies
    commit-message:
      prefix: chore
    groups:
      dev-dependencies:
        dependency-type: development
        patterns:
          - '*'
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
